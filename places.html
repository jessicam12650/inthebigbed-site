    /* ── HELPERS ── */
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function starsHtml(r) {
      const n = Math.min(5, Math.round(r));
      return '<span class="stars">' + '★'.repeat(n) + '☆'.repeat(5 - n) + '</span>';
    }
    function openStatus(oh) {
      if (!oh) return { cls: 'unknown', text: 'Hours not listed' };
      if (oh.open_now === true) return { cls: 'open', text: 'Open now' };
      const periods = oh.periods;
      if (periods && periods.length) {
        const now = new Date(), day = now.getDay(), mins = now.getHours() * 60 + now.getMinutes();
        for (let d = 0; d <= 7; d++) {
          const cd = (day + d) % 7;
          const ps = periods.filter(p => p.open && p.open.day === cd).sort((a, b) => +a.open.time - +b.open.time);
          for (const p of ps) {
            const h = +p.open.time.slice(0, 2), m = +p.open.time.slice(2);
            if (d === 0 && h * 60 + m <= mins) continue;
            const ap = h >= 12 ? 'PM' : 'AM', h12 = h % 12 || 12;
            const tl = h12 + (m ? ':' + String(m).padStart(2, '0') : '') + ' ' + ap;
            if (d === 0) return { cls: 'closed', text: 'Closed — opens ' + tl };
            if (d === 1) return { cls: 'closed', text: 'Closed — opens ' + tl + ' tomorrow' };
            const dn = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            return { cls: 'closed', text: 'Closed — opens ' + dn[cd] + ' ' + tl };
          }
        }
      }
      return { cls: 'closed', text: 'Closed now' };
    }

    /* Return today's hours string from weekday_text, e.g. "12:00 PM – 11:00 PM" */
    function todayHours(oh) {
      if (!oh || !oh.weekday_text || !oh.weekday_text.length) return '';
      /* weekday_text is Mon–Sun (index 0=Mon); JS getDay() is 0=Sun */
      const idx = (new Date().getDay() + 6) % 7;
      const entry = oh.weekday_text[idx] || '';
      const colon = entry.indexOf(':');
      return colon === -1 ? '' : entry.slice(colon + 2).trim();
    }

    /* ── BUILD CARDS ── */
    function buildCards(venues, gridId, featured) {
      const grid = document.getElementById(gridId);
      venues.forEach(function(v) {
        const fallbackDir = 'https://www.google.com/maps/search/' + encodeURIComponent(v.name + ', ' + v.address);
        const noteHtml = v.note
          ? '<div class="card-address" style="font-style:italic;">' + esc(v.note) + '</div>'
          : '';
        grid.insertAdjacentHTML('beforeend',
          '<div class="venue-card' + (featured ? ' featured' : '') + '" id="c-' + v.id + '" data-id="' + v.id + '" data-cat="' + v.cat + '">' +
            '<div class="card-tag">' + esc(v.tag) + '</div>' +
            '<div class="card-name">' + esc(v.name) + '</div>' +
            '<div class="card-address">' + esc(v.address) + '</div>' +
            noteHtml +
            '<div class="card-status unknown" id="s-' + v.id + '">Loading hours\u2026</div>' +
            '<a class="card-directions" id="d-' + v.id + '" href="' + esc(fallbackDir) + '" target="_blank" rel="noopener">Get directions \u2192</a>' +
          '</div>'
        );
        document.getElementById('c-' + v.id).addEventListener('click', function(e) {
          if (e.target.tagName === 'A') return;
          const mk = markers[v.id];
          if (!mk) return;
          map.panTo(mk.getPosition());
          map.setZoom(15);
          google.maps.event.trigger(mk, 'click');
          document.getElementById('map').scrollIntoView({ behavior: 'smooth' });
        });
      });
    }

    buildCards(HANDPICKED, 'handpicked-grid', true);
    buildCards(VENUES,     'venue-grid',      false);

    /* ── MAP STYLES ── */
    const MAP_STYLES = [
      { featureType: 'poi',       elementType: 'all',             stylers: [{ visibility: 'off' }] },
      { featureType: 'transit',   elementType: 'labels.icon',     stylers: [{ visibility: 'off' }] },
      { featureType: 'road',      elementType: 'geometry.fill',   stylers: [{ color: '#ffffff' }] },
      { featureType: 'road',      elementType: 'geometry.stroke', stylers: [{ color: '#e0d8ce' }] },
      { featureType: 'landscape', elementType: 'geometry.fill',   stylers: [{ color: '#f5f0ea' }] },
      { featureType: 'water',     elementType: 'geometry.fill',   stylers: [{ color: '#bdd5e0' }] },
    ];

    /* ── INIT MAP ── */
    function initMap() {
      map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 53.4084, lng: -2.9916 },
        zoom: 13,
        styles: MAP_STYLES,
        mapTypeControl: false,
        streetViewControl: false,
        fullscreenControl: true,
        zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_BOTTOM },
      });
      infoWindow = new google.maps.InfoWindow({ maxWidth: 260 });

      /* Immediate pins from hardcoded coordinates */
      ALL_VENUES.forEach(function(v) {
        if (v.latLng) addMarker(v, v.latLng, null);
      });

      /* Progressive enrichment via Places API */
      const svc = new google.maps.places.PlacesService(map);
      ALL_VENUES.forEach(function(v) { enrichVenue(v, svc); });
    }

    /* ── ENRICH VENUE ── */
    function enrichVenue(v, svc) {
      svc.findPlaceFromQuery(
        { query: v.name + ', ' + v.address, fields: ['place_id', 'geometry'] },
        function(res, st) {
          if (st !== google.maps.places.PlacesServiceStatus.OK || !res || !res.length) {
            setStatus(v.id, 'unknown', 'Details coming soon');
            return;
          }
          const placeId = res[0].place_id;
          const fbLoc   = res[0].geometry && res[0].geometry.location;

          svc.getDetails(
            { placeId: placeId, fields: ['formatted_address', 'opening_hours', 'rating', 'user_ratings_total', 'geometry'] },
            function(place, ds) {
              const ok  = ds === google.maps.places.PlacesServiceStatus.OK;
              const loc = (ok && place && place.geometry) ? place.geometry.location : fbLoc;

              if (ok && place) {
                const s = openStatus(place.opening_hours);
                const h = todayHours(place.opening_hours);
                setStatus(v.id, s.cls, h ? s.text + ' \u00b7 ' + h : s.text);

                if (place.rating && !document.getElementById('r-' + v.id)) {
                  const nameEl = document.querySelector('#c-' + v.id + ' .card-name');
                  if (nameEl) {
                    const ratingText = place.rating +
                      (place.user_ratings_total ? ' (' + place.user_ratings_total.toLocaleString() + ' reviews)' : '');
                    nameEl.insertAdjacentHTML('afterend',
                      '<div class="card-rating" id="r-' + v.id + '">' + starsHtml(place.rating) + ' ' + esc(ratingText) + '</div>'
                    );
                  }
                }

                if (place.formatted_address) {
                  const addrEl = document.querySelector('#c-' + v.id + ' .card-address');
                  if (addrEl && !v.note) addrEl.textContent = place.formatted_address;
                }

                const dirEl = document.getElementById('d-' + v.id);
                if (dirEl) dirEl.href = 'https://www.google.com/maps/dir/?api=1&destination_place_id=' + placeId;
              } else {
                setStatus(v.id, 'unknown', 'Details coming soon');
              }

              /* Replace hardcoded pin with accurate API-located pin */
              if (loc) addMarker(v, loc, ok && place ? place.rating : null);
            }
          );
        }
      );
    }

    function setStatus(id, cls, text) {
      const el = document.getElementById('s-' + id);
      if (!el) return;
      el.className = 'card-status ' + cls;
      el.textContent = text;
    }

    function addMarker(v, loc, rating) {
      /* Remove previous pin for this venue before placing new one */
      if (markers[v.id]) markers[v.id].setMap(null);

      const mk = new google.maps.Marker({
        position: loc,
        map: map,
        title: v.name,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 9,
          fillColor: '#D4845A',
          fillOpacity: 1,
          strokeColor: '#1C1C1A',
          strokeWeight: 1.5,
        },
      });
      markers[v.id] = mk;

      /* Respect any filter already applied when this marker is (re-)created */
      if (activeFilter !== 'all' && v.cat !== activeFilter) mk.setVisible(false);

      mk.addListener('click', function() {
        const stars = rating ? '★'.repeat(Math.min(5, Math.round(rating))) : '';
        infoWindow.setContent(
          '<div style="font-family:\'DM Sans\',sans-serif;padding:4px 2px;min-width:150px;">' +
            '<div style="font-weight:700;font-size:14px;color:#1C1C1A;margin-bottom:4px;line-height:1.3;">' + esc(v.name) + '</div>' +
            (rating ? '<div style="font-size:13px;color:#777;"><span style="color:#E8C84A;">' + stars + '</span> ' + rating + '</div>' : '') +
          '</div>'
        );
        infoWindow.open(map, mk);

        const card = document.getElementById('c-' + v.id);
        if (card && !card.classList.contains('hidden')) {
          document.querySelectorAll('.venue-card.highlighted').forEach(function(c) { c.classList.remove('highlighted'); });
          card.classList.add('highlighted');
          card.scrollIntoView({ behavior: 'smooth', block: 'center' });
          setTimeout(function() { card.classList.remove('highlighted'); }, 2500);
        }
      });
    }

    /* ── FILTERS ── */
    function applyFilter(f) {
      activeFilter = f;

      /* Update button states */
      document.querySelectorAll('.filter-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.filter === f);
      });

      /* Show/hide cards in both grids */
      document.querySelectorAll('.venue-card').forEach(function(card) {
        card.classList.toggle('hidden', f !== 'all' && card.dataset.cat !== f);
      });

      /* Show/hide map markers */
      ALL_VENUES.forEach(function(v) {
        var mk = markers[v.id];
        if (mk) mk.setVisible(f === 'all' || v.cat === f);
      });
    }

    document.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.addEventListener('click', function() { applyFilter(btn.dataset.filter); });
    });
  </script>

  <script>
    document.getElementById('nav-hamburger').addEventListener('click', function() {
      document.getElementById('nav').classList.toggle('open');
    });
  </script>

  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCIaK7AvsGOUBhmRojkTG4bC-tPLUEIJBY&libraries=places&callback=initMap">
  </script>

</body>
</html>
