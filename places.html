<!DOCTYPE html>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #F2EDE6;
      color: #1C1C1A;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── NAV ── */
    .nav {
      position: sticky; top: 0; z-index: 200;
      background: #F2EDE6; border-bottom: 1px solid #1C1C1A;
      height: 64px; padding: 0 48px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { font-weight: 900; font-size: 22px; letter-spacing: -1px; color: #1C1C1A; text-decoration: none; }
    .nav-links { display: flex; align-items: center; gap: 28px; }
    .nav-link {
      font-weight: 700; font-size: 14px; color: #1C1C1A;
      text-decoration: none; transition: opacity 0.15s;
    }
    .nav-link:hover { opacity: 0.55; }
    .nav-cta {
      font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 14px;
      background: #D4845A; color: #fff; padding: 9px 18px; border-radius: 4px;
      text-decoration: none; display: inline-block; transition: opacity 0.15s;
    }
    .nav-cta:hover { opacity: 0.88; }
    .nav-emergency {
      font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 14px;
      background: #C84B31; color: #fff; padding: 9px 18px; border-radius: 4px;
      text-decoration: none; display: inline-block; transition: opacity 0.15s;
    }
    .nav-emergency:hover { opacity: 0.88; }
    .nav-hamburger {
      display: none; background: none; border: none;
      cursor: pointer; padding: 4px; flex-direction: column; gap: 5px;
    }
    .nav-hamburger span {
      display: block; width: 22px; height: 2px;
      background: #1C1C1A; border-radius: 1px;
      transition: transform 0.2s, opacity 0.2s;
    }
    .nav.open .nav-hamburger span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav.open .nav-hamburger span:nth-child(2) { opacity: 0; }
    .nav.open .nav-hamburger span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ── MAP SHELL ── */
    .map-shell {
      position: relative;
      flex: 1;
      min-height: 0;
      width: 100%;
    }
    #map { width: 100%; height: 100%; display: block; }

    /* ── FILTER CHIPS ── */
    .filter-bar {
      position: absolute;
      top: 16px; left: 16px; right: 16px;
      z-index: 5;
      display: flex; gap: 8px; flex-wrap: wrap;
      pointer-events: none;
    }
    .filter-chip {
      pointer-events: auto;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700; font-size: 13px;
      background: #fff; color: #1C1C1A;
      padding: 8px 16px; border: none;
      border-radius: 999px;
      box-shadow: 0 2px 8px rgba(28,28,26,0.18);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }
    .filter-chip:hover { background: #f5f0ea; box-shadow: 0 3px 10px rgba(28,28,26,0.22); }
    .filter-chip.active { background: #1C1C1A; color: #F2EDE6; }

    /* ── PLACE CARD ── */
    .place-card {
      position: absolute;
      z-index: 6;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 12px 32px rgba(28,28,26,0.18);
      padding: 20px 20px 18px;
      opacity: 0;
      pointer-events: none;
      transition: transform 0.28s cubic-bezier(0.2,0.7,0.2,1), opacity 0.2s ease;
      left: 16px;
      bottom: 16px;
      width: 360px;
      max-width: calc(100% - 32px);
      transform: translateY(8px);
    }
    .place-card.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .pc-close {
      position: absolute; top: 8px; right: 8px;
      width: 32px; height: 32px;
      border: none; background: transparent;
      font-size: 22px; line-height: 1; color: #555;
      cursor: pointer; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .pc-close:hover { background: rgba(28,28,26,0.06); color: #1C1C1A; }
    .pc-name { font-size: 19px; font-weight: 700; color: #1C1C1A; line-height: 1.25; margin: 0 36px 8px 0; }
    .pc-badge {
      display: inline-block;
      font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
      padding: 4px 10px; border-radius: 999px; margin-bottom: 10px;
      background: #EEE8E0; color: #555;
    }
    .pc-badge[data-cat="Pubs"]        { background: #F4E4D4; color: #8B6F47; }
    .pc-badge[data-cat="Bars"]        { background: #DCE8F2; color: #3E6084; }
    .pc-badge[data-cat="Restaurants"] { background: #F7D9D1; color: #A54A3A; }
    .pc-badge[data-cat="Street Food"] { background: #FCE4B0; color: #8A6B2E; }
    .pc-badge[data-cat="Live Music"]  { background: #E4D4F2; color: #6B4A8A; }
    .pc-desc { font-size: 14px; color: #3d3d3d; line-height: 1.45; margin: 0 0 8px; }
    .pc-addr { font-size: 12px; color: #777; line-height: 1.4; margin: 0 0 12px; }
    .pc-rating { font-size: 13px; color: #333; margin-bottom: 6px; display: none; }
    .pc-rating .pc-stars { color: #E8C84A; letter-spacing: 1px; margin-right: 4px; }
    .pc-rating-count { color: #888; margin-left: 4px; }
    .pc-hours { font-size: 13px; margin-bottom: 10px; display: none; }
    .pc-hours.open { color: #3d7a4b; }
    .pc-hours.closed { color: #9a3a2e; }
    .pc-hours .pc-hours-detail { color: #555; }
    .pc-reviews { margin-bottom: 14px; display: none; }
    .pc-review {
      background: #F7F2ED;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      color: #3d3d3d;
      line-height: 1.45;
      margin-bottom: 6px;
    }
    .pc-review:last-child { margin-bottom: 0; }
    .pc-review-author { display: block; margin-top: 4px; font-size: 11px; color: #777; }
    .pc-review-author .pc-stars { color: #E8C84A; letter-spacing: 1px; margin-right: 4px; }
    .place-card { max-height: calc(100vh - 96px); overflow-y: auto; }
    .pc-cta {
      display: block; text-align: center;
      background: #D4845A; color: #fff;
      font-weight: 700; font-size: 14px;
      padding: 11px 16px; border-radius: 8px;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .pc-cta:hover { opacity: 0.88; }

    @media (max-width: 768px) {
      .nav { padding: 0 20px; height: 56px; flex-wrap: wrap; align-content: flex-start; }

      .nav-logo { font-size: 18px; }

      .nav.open .nav-links { display: flex; }
      .nav-hamburger { display: flex; }
      .filter-bar { top: 12px; left: 12px; right: 12px; gap: 6px; }
      .filter-chip { font-size: 12px; padding: 7px 13px; }
      .place-card {
        left: 0; right: 0; bottom: 0;
        width: 100%; max-width: none;
        border-radius: 12px 12px 0 0;
        padding: 18px 18px 16px;
        transform: translateY(100%);

      { id: 'permit-room',    name: 'Permit Room by Dishoom',         address: 'Liverpool City Centre',                   cat: 'restaurant', tag: 'Dog-friendly 🐾', latLng: { lat: 53.4064, lng: -2.9863 } },
      { id: 'mowgli',         name: 'Mowgli',                        address: '69 Bold Street, Liverpool L1 4EZ',                   cat: 'restaurant', tag: 'Dog-friendly 🐾', latLng: { lat: 53.4029, lng: -2.9774 }, description: 'Indian street food', category: 'Restaurants' },
      { id: 'mcnastys',       name: "McNasty's",                      address: 'Seel Street, Liverpool',                  cat: 'pub-bar',    tag: 'Dog-friendly 🐾', latLng: { lat: 53.4006, lng: -2.9768 } },
      { id: 'frederiks',      name: 'Frederiks',                      address: 'Hope Street, Liverpool',                  cat: 'pub-bar',    tag: 'Dog-friendly 🐾', latLng: { lat: 53.4021, lng: -2.9695 } },
      { id: 'shandon-bells',  name: 'The Shandon Bells',              address: 'Hope Street, Liverpool',                  cat: 'pub-bar',    tag: 'Dog-friendly 🐾', latLng: { lat: 53.4019, lng: -2.9692 } },
      { id: 'duke-st-market', name: 'Duke Street Food and Drink Market', address: 'Duke Street, Liverpool',              cat: 'restaurant', tag: 'Dog-friendly 🐾', latLng: { lat: 53.4013, lng: -2.9790 } },
      { id: 'brasco-mann',    name: 'Brasco Lounge',                  address: 'Mann Island, Liverpool',                  cat: 'pub-bar',    tag: 'Dog-friendly 🐾', latLng: { lat: 53.4037, lng: -2.9978 } },
    ];

    const ALL_VENUES = [...HANDPICKED, ...VENUES];

    /* ── STATE ── */
    let map;
    let placesSvc;
    const markers = {};
    const detailsCache = {};
    let activeFilter = 'all';

    /* ── HELPERS ── */
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    /* Match a venue against a chip's filter value. Falls back to the broader
       `cat` field when an entry has no explicit `category`. */
    function matchesFilter(v, f) {
      if (f === 'all') return true;
      if (v.category) return v.category === f;
      if (f === 'Pubs' || f === 'Bars') return v.cat === 'pub-bar';
      if (f === 'Restaurants') return v.cat === 'restaurant';
      return false;
    }

    /* ── MAP STYLES ── */
    const MAP_STYLES = [
      { featureType: 'poi',       elementType: 'all',             stylers: [{ visibility: 'off' }] },
      { featureType: 'transit',   elementType: 'labels.icon',     stylers: [{ visibility: 'off' }] },
      { featureType: 'road',      elementType: 'geometry.fill',   stylers: [{ color: '#ffffff' }] },
      { featureType: 'road',      elementType: 'geometry.stroke', stylers: [{ color: '#e0d8ce' }] },
      { featureType: 'landscape', elementType: 'geometry.fill',   stylers: [{ color: '#f5f0ea' }] },
      { featureType: 'water',     elementType: 'geometry.fill',   stylers: [{ color: '#bdd5e0' }] },
    ];

    /* ── INIT MAP ── */
    function initMap() {
      map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 53.4084, lng: -2.9916 },
        zoom: 13,
        styles: MAP_STYLES,
        mapTypeControl: false,
        streetViewControl: false,
        fullscreenControl: true,
        zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_BOTTOM },
      });

      /* Close the card when the user clicks the map background (not a marker) */
      map.addListener('click', closeCard);

      /* Immediate pins from hardcoded coordinates */
      ALL_VENUES.forEach(function(v) {
        if (v.latLng) addMarker(v, v.latLng);
      });

      /* Progressive enrichment via Places API */
      placesSvc = new google.maps.places.PlacesService(map);
      ALL_VENUES.forEach(function(v) { enrichVenue(v); });
    }

    /* ── ENRICH VENUE ── Resolve the place_id once so the pin lands in the
       right spot; full details (rating, hours, reviews) are fetched lazily
       when the user opens the card. */
    function enrichVenue(v) {
      placesSvc.findPlaceFromQuery(
        { query: v.name + ', ' + v.address, fields: ['place_id', 'geometry'] },
        function(res, st) {
          if (st !== google.maps.places.PlacesServiceStatus.OK || !res || !res.length) return;
          v.placeId = res[0].place_id;
          const loc = res[0].geometry && res[0].geometry.location;
          if (loc) addMarker(v, loc, null);
        }
      );
    }

    /* Lazy-load rating, hours and reviews on first card open; cache per venue. */
    function fetchDetails(v, cb) {
      if (detailsCache[v.id]) { cb(detailsCache[v.id]); return; }
      if (!placesSvc || !v.placeId) return;
      placesSvc.getDetails(
        { placeId: v.placeId, fields: ['rating', 'user_ratings_total', 'opening_hours', 'reviews'] },
        function(place, st) {
          if (st !== google.maps.places.PlacesServiceStatus.OK || !place) return;
          detailsCache[v.id] = place;
          cb(place);
        }
      );
    }

    function addMarker(v, loc) {
      if (markers[v.id]) markers[v.id].setMap(null);

      const mk = new google.maps.Marker({
        position: loc,
        map: map,
        title: v.name,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 9,
          fillColor: '#D4845A',
          fillOpacity: 1,
          strokeColor: '#1C1C1A',
          strokeWeight: 1.5,
        },
      });
      markers[v.id] = mk;

      if (!matchesFilter(v, activeFilter)) mk.setVisible(false);

      mk.addListener('click', function() { openCard(v); });
    }

    /* ── FILTERS ── */
    function applyFilter(f) {
      activeFilter = f;
      document.querySelectorAll('.filter-chip').forEach(function(b) {
        b.classList.toggle('active', b.dataset.filter === f);
      });
      ALL_VENUES.forEach(function(v) {
        var mk = markers[v.id];
        if (mk) mk.setVisible(matchesFilter(v, f));
      });
    }

    document.querySelectorAll('.filter-chip').forEach(function(btn) {
      btn.addEventListener('click', function() { applyFilter(btn.dataset.filter); });
    });

    /* ── PLACE CARD ── */
    const placeCard = document.getElementById('place-card');
    const pcName    = document.getElementById('pc-name');
    const pcBadge   = document.getElementById('pc-badge');
    const pcDesc    = document.getElementById('pc-desc');
    const pcAddr    = document.getElementById('pc-addr');
    const pcRating  = document.getElementById('pc-rating');
    const pcHours   = document.getElementById('pc-hours');
    const pcReviews = document.getElementById('pc-reviews');
    const pcDir     = document.getElementById('pc-dir');

    /* Category used for the badge — falls back from `category` to a label
       derived from the broader `cat` field so every card shows something. */
    function displayCategory(v) {
      if (v.category) return v.category;
      if (v.cat === 'pub-bar') return 'Pubs';
      if (v.cat === 'restaurant') return 'Restaurants';
      return '';
    }

    function openCard(v) {
      pcName.textContent = v.name;
      const cat = displayCategory(v);
      pcBadge.textContent = cat;
      pcBadge.setAttribute('data-cat', cat);
      pcBadge.style.display = cat ? 'inline-block' : 'none';
      pcDesc.textContent = v.description || '';
      pcDesc.style.display = v.description ? 'block' : 'none';
      pcAddr.textContent = v.address;
      pcDir.href = 'https://www.google.com/maps/dir/?api=1&destination=' +
        encodeURIComponent(v.name + ', ' + v.address);

      /* Reset detail sections; they'll fill in when details arrive. */
      pcRating.style.display = 'none';
      pcHours.style.display = 'none';
      pcReviews.style.display = 'none';
      pcRating.innerHTML = '';
      pcHours.innerHTML = '';
      pcReviews.innerHTML = '';

      if (detailsCache[v.id]) {
        renderDetails(detailsCache[v.id]);
      } else {
        const id = v.id;
        fetchDetails(v, function(place) {
          /* Only render if the card is still showing this venue */
          if (placeCard.dataset.currentId === id) renderDetails(place);
        });
      }
      placeCard.dataset.currentId = v.id;

      placeCard.classList.add('open');
      placeCard.setAttribute('aria-hidden', 'false');
    }

    function starsMarkup(r) {
      if (r == null) return '';
      const full = Math.floor(r);
      const half = r - full >= 0.5 ? 1 : 0;
      const empty = 5 - full - half;
      return '<span class="pc-stars">' +
        '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(empty) +
        '</span>';
    }

    function todayHoursText(oh) {
      if (!oh || !oh.weekday_text || !oh.weekday_text.length) return '';
      /* weekday_text is Monday..Sunday; JS getDay() is Sun..Sat. */
      const idx = (new Date().getDay() + 6) % 7;
      const entry = oh.weekday_text[idx] || '';
      const colon = entry.indexOf(':');
      return colon === -1 ? '' : entry.slice(colon + 2).trim();
    }

    function renderDetails(place) {
      if (place.rating) {
        pcRating.innerHTML = starsMarkup(place.rating) + place.rating.toFixed(1) +
          (place.user_ratings_total
            ? ' <span class="pc-rating-count">(' + place.user_ratings_total.toLocaleString() + ' reviews)</span>'
            : '');
        pcRating.style.display = 'block';
      }

      if (place.opening_hours) {
        const isOpen = typeof place.opening_hours.isOpen === 'function'
          ? place.opening_hours.isOpen()
          : place.opening_hours.open_now;
        const hours = todayHoursText(place.opening_hours);
        pcHours.textContent = (isOpen ? 'Open now' : 'Closed now') + (hours ? ' · ' + hours : '');
        pcHours.className = 'pc-hours ' + (isOpen ? 'open' : 'closed');
        pcHours.style.display = 'block';
      }

      if (place.reviews && place.reviews.length) {
        const html = place.reviews.slice(0, 2).map(function(r) {
          const t = (r.text || '').replace(/\s+/g, ' ').trim();
          const snippet = t.length > 140 ? t.slice(0, 140).trim() + '…' : t;
          return '<div class="pc-review">' + esc(snippet) +
            '<span class="pc-review-author">' + starsMarkup(r.rating || 0) +
              esc(r.author_name || '') +
              (r.relative_time_description ? ' · ' + esc(r.relative_time_description) : '') +
            '</span>' +
          '</div>';
        }).join('');
        pcReviews.innerHTML = html;
        pcReviews.style.display = 'block';
      }
    }

    function closeCard() {
      placeCard.classList.remove('open');
      placeCard.setAttribute('aria-hidden', 'true');
    }

    document.getElementById('pc-close').addEventListener('click', closeCard);
  </script>

  <script>
    document.getElementById('nav-hamburger').addEventListener('click', function() {
      document.getElementById('nav').classList.toggle('open');
    });
  </script>

  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCIaK7AvsGOUBhmRojkTG4bC-tPLUEIJBY&libraries=places&callback=initMap">
  </script>

</body>
</html>
