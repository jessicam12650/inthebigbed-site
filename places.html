    const ALL_VENUES = [...HANDPICKED, ...VENUES];

    /* ── STATE ── */
    let map, infoWindow;
    const markers = {};
    let activeFilter = 'all';

    /* ── HELPERS ── */
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function starsHtml(r) {
      const n = Math.min(5, Math.round(r));
      return '<span style="color:#E8C84A;">' + '★'.repeat(n) + '☆'.repeat(5 - n) + '</span>';
    }
    /* Match a venue against a chip's filter value. Falls back to the broader
       `cat` field when an entry has no explicit `category`. */
    function matchesFilter(v, f) {
      if (f === 'all') return true;
      if (v.category) return v.category === f;
      if (f === 'Pubs' || f === 'Bars') return v.cat === 'pub-bar';
      if (f === 'Restaurants') return v.cat === 'restaurant';
      return false;
    }

    /* ── MAP STYLES ── */
    const MAP_STYLES = [
      { featureType: 'poi',       elementType: 'all',             stylers: [{ visibility: 'off' }] },
      { featureType: 'transit',   elementType: 'labels.icon',     stylers: [{ visibility: 'off' }] },
      { featureType: 'road',      elementType: 'geometry.fill',   stylers: [{ color: '#ffffff' }] },
      { featureType: 'road',      elementType: 'geometry.stroke', stylers: [{ color: '#e0d8ce' }] },
      { featureType: 'landscape', elementType: 'geometry.fill',   stylers: [{ color: '#f5f0ea' }] },
      { featureType: 'water',     elementType: 'geometry.fill',   stylers: [{ color: '#bdd5e0' }] },
    ];

    /* ── INIT MAP ── */
    function initMap() {
      map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 53.4084, lng: -2.9916 },
        zoom: 13,
        styles: MAP_STYLES,
        mapTypeControl: false,
        streetViewControl: false,
        fullscreenControl: true,
        zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_BOTTOM },
      });
      infoWindow = new google.maps.InfoWindow({ maxWidth: 260 });

      /* Immediate pins from hardcoded coordinates */
      ALL_VENUES.forEach(function(v) {
        if (v.latLng) addMarker(v, v.latLng, null);
      });

      /* Progressive enrichment via Places API */
      const svc = new google.maps.places.PlacesService(map);
      ALL_VENUES.forEach(function(v) { enrichVenue(v, svc); });
    }

    /* ── ENRICH VENUE ── Refine pin location and pick up ratings via Places API */
    function enrichVenue(v, svc) {
      svc.findPlaceFromQuery(
        { query: v.name + ', ' + v.address, fields: ['place_id', 'geometry'] },
        function(res, st) {
          if (st !== google.maps.places.PlacesServiceStatus.OK || !res || !res.length) return;
          const placeId = res[0].place_id;
          const fbLoc   = res[0].geometry && res[0].geometry.location;

          svc.getDetails(
            { placeId: placeId, fields: ['rating', 'geometry'] },
            function(place, ds) {
              const ok  = ds === google.maps.places.PlacesServiceStatus.OK;
              const loc = (ok && place && place.geometry) ? place.geometry.location : fbLoc;
              if (loc) addMarker(v, loc, ok && place ? place.rating : null);
            }
          );
        }
      );
    }

    function addMarker(v, loc, rating) {
      if (markers[v.id]) markers[v.id].setMap(null);

      const mk = new google.maps.Marker({
        position: loc,
        map: map,
        title: v.name,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 9,
          fillColor: '#D4845A',
          fillOpacity: 1,
          strokeColor: '#1C1C1A',
          strokeWeight: 1.5,
        },
      });
      markers[v.id] = mk;

      if (!matchesFilter(v, activeFilter)) mk.setVisible(false);

      mk.addListener('click', function() {
        const addrHtml   = '<div style="font-size:12px;color:#777;line-height:1.4;">' + esc(v.address) + '</div>';
        const descHtml   = v.description ? '<div style="font-size:13px;color:#555;margin-top:4px;line-height:1.4;">' + esc(v.description) + '</div>' : '';
        const ratingHtml = rating ? '<div style="font-size:13px;color:#777;margin-top:6px;">' + starsHtml(rating) + ' ' + rating + '</div>' : '';
        infoWindow.setContent(
          '<div style="font-family:\'DM Sans\',sans-serif;padding:4px 2px;min-width:180px;">' +
            '<div style="font-weight:700;font-size:14px;color:#1C1C1A;margin-bottom:4px;line-height:1.3;">' + esc(v.name) + '</div>' +
            addrHtml + descHtml + ratingHtml +
          '</div>'
        );
        infoWindow.open(map, mk);
      });
    }

    /* ── FILTERS ── */
    function applyFilter(f) {
      activeFilter = f;
      document.querySelectorAll('.filter-chip').forEach(function(b) {
        b.classList.toggle('active', b.dataset.filter === f);
      });
      ALL_VENUES.forEach(function(v) {
        var mk = markers[v.id];
        if (mk) mk.setVisible(matchesFilter(v, f));
      });
    }

    document.querySelectorAll('.filter-chip').forEach(function(btn) {
      btn.addEventListener('click', function() { applyFilter(btn.dataset.filter); });
    });
  </script>

  <script>
    document.getElementById('nav-hamburger').addEventListener('click', function() {
      document.getElementById('nav').classList.toggle('open');
    });
  </script>

  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCIaK7AvsGOUBhmRojkTG4bC-tPLUEIJBY&libraries=places&callback=initMap">
  </script>

</body>
</html>
